services:
  app:
    container_name: torchlife_app
    build: .
    command: sh -c "npx prisma generate && yarn start:dev"
    env_file:
      - .env.local
    depends_on:
      - postgres
      - redis
    ports:
      - "1011:8080"
    volumes:
      - .:/usr/src/app
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: torchlife_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: torchlife
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: torchlife_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: