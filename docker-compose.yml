version: '3.9'

services:
    app:
        build: .
        command: yarn start:prod
        env_file:
            - .env
        depends_on:
            - postgres
            - redis
        ports:
            - '3000:3000'
        restart: always

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: torchlife_main_db
        # Remove port mapping in production
        # ports:
        #   - "5432:5432"
        restart: always

    redis:
        image: redis:7-alpine
        # ports:
        #   - "6379:6379"
        restart: always
